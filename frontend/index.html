<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DivineLight - Unified AI Memory System</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        h1 { color: #58a6ff; margin-bottom: 20px; font-size: 1.8rem; }
        h2 { color: #8b949e; margin: 20px 0 10px; font-size: 1.2rem; border-bottom: 1px solid #21262d; padding-bottom: 8px; }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .status { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #3fb950; }
        .status-dot.offline { background: #f85149; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .panel { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 16px; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .panel-title { font-weight: 600; color: #f0f6fc; }
        textarea, input, select { width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; padding: 10px; font-size: 14px; }
        textarea { resize: vertical; min-height: 100px; }
        textarea:focus, input:focus, select:focus { outline: none; border-color: #58a6ff; }
        button { background: #238636; color: #fff; border: none; border-radius: 6px; padding: 10px 16px; cursor: pointer; font-size: 14px; font-weight: 500; }
        button:hover { background: #2ea043; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        button.secondary { background: #21262d; }
        button.secondary:hover { background: #30363d; }
        .result { background: #0d1117; border: 1px solid #21262d; border-radius: 6px; padding: 12px; margin-top: 10px; max-height: 300px; overflow-y: auto; }
        .result-item { padding: 8px; border-bottom: 1px solid #21262d; }
        .result-item:last-child { border-bottom: none; }
        .result-meta { font-size: 0.8rem; color: #8b949e; margin-top: 4px; }
        .score { color: #58a6ff; font-weight: 600; }
        .tag { display: inline-block; background: #21262d; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; margin-right: 4px; }
        .error { color: #f85149; padding: 10px; background: rgba(248, 81, 73, 0.1); border-radius: 6px; margin-top: 10px; }
        .tabs { display: flex; gap: 4px; margin-bottom: 12px; }
        .tab { background: transparent; color: #8b949e; padding: 8px 16px; border-radius: 6px; }
        .tab.active { background: #21262d; color: #f0f6fc; }
        .full-width { grid-column: 1 / -1; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 16px; text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: 700; color: #58a6ff; }
        .stat-label { font-size: 0.85rem; color: #8b949e; margin-top: 4px; }
        pre { white-space: pre-wrap; word-wrap: break-word; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>DivineLight</h1>
            <div class="status">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Connecting...</span>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="memCount">0</div>
                <div class="stat-label">Memories</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="nodeCount">0</div>
                <div class="stat-label">Graph Nodes</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="edgeCount">0</div>
                <div class="stat-label">Graph Edges</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="beliefCount">0</div>
                <div class="stat-label">Beliefs</div>
            </div>
        </div>

        <div class="grid">
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">Memory Ingestion</span>
                </div>
                <input type="text" id="memorySource" placeholder="Source (e.g., user_session)">
                <input type="text" id="memoryTags" placeholder="Tags (comma separated)" style="margin-top: 8px;">
                <textarea id="memoryContent" placeholder="Memory content..." style="margin-top: 8px;"></textarea>
                <button onclick="ingestMemory()" style="margin-top: 12px;">Ingest Memory</button>
                <div id="ingestResult"></div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">Knowledge Graph</span>
                </div>
                <input type="text" id="nodeType" placeholder="Node Type (e.g., Person)">
                <input type="text" id="nodeLabel" placeholder="Node Label" style="margin-top: 8px;">
                <button onclick="createNode()" style="margin-top: 8px;">Create Node</button>
                <div class="tabs" style="margin-top: 12px;">
                    <button class="tab active" onclick="showGraphTab('traverse')">Traverse</button>
                    <button class="tab" onclick="showGraphTab('create-edge')">Create Edge</button>
                    <button class="tab" onclick="showGraphTab('path')">Find Path</button>
                </div>
                <div id="graphTraverseTab">
                    <input type="text" id="traverseNodeId" placeholder="Start Node ID (optional)">
                    <input type="number" id="traverseDepth" placeholder="Depth" value="3" style="margin-top: 8px;">
                    <button onclick="traverseGraph()" style="margin-top: 8px;">Traverse</button>
                </div>
                <div id="graphEdgeTab" style="display: none;">
                    <input type="text" id="edgeSource" placeholder="Source Node ID">
                    <input type="text" id="edgeTarget" placeholder="Target Node ID" style="margin-top: 8px;">
                    <input type="text" id="edgeRelation" placeholder="Relation (e.g., knows)" style="margin-top: 8px;">
                    <input type="number" id="edgeConfidence" placeholder="Confidence (0-1)" value="0.9" step="0.1" style="margin-top: 8px;">
                    <button onclick="createEdge()" style="margin-top: 8px;">Create Edge</button>
                </div>
                <div id="graphPathTab" style="display: none;">
                    <input type="text" id="pathStart" placeholder="Start Node ID">
                    <input type="text" id="pathEnd" placeholder="End Node ID" style="margin-top: 8px;">
                    <button onclick="findPath()" style="margin-top: 8px;">Find Path</button>
                </div>
                <div id="graphResult"></div>
            </div>

            <div class="panel full-width">
                <div class="panel-header">
                    <span class="panel-title">Hybrid Retrieval</span>
                </div>
                <div style="display: flex; gap: 8px;">
                    <input type="text" id="retrieveQuery" placeholder="Search query...">
                    <button onclick="retrieve()">Search</button>
                </div>
                <div class="tabs" style="margin-top: 12px;">
                    <button class="tab active" onclick="showRetrieveTab('search')">Search</button>
                    <button class="tab" onclick="showRetrieveTab('interpret')">Interpret</button>
                    <button class="tab" onclick="showRetrieveTab('agents')">Agents</button>
                </div>
                <div id="searchTab">
                    <div id="searchResult"></div>
                </div>
                <div id="interpretTab" style="display: none;">
                    <button onclick="interpret()" style="margin-bottom: 8px;">Run Interpretation</button>
                    <div id="interpretResult"></div>
                </div>
                <div id="agentsTab" style="display: none;">
                    <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                        <button class="secondary" onclick="runAgent('retriever')">Retriever</button>
                        <button class="secondary" onclick="runAgent('verifier')">Verifier</button>
                        <button class="secondary" onclick="runAgent('synthesizer')">Synthesizer</button>
                        <button class="secondary" onclick="runAgent('contradiction')">Contradiction</button>
                    </div>
                    <div id="agentResult" style="margin-top: 12px;"></div>
                </div>
            </div>

            <div class="panel full-width">
                <div class="panel-header">
                    <span class="panel-title">System Health</span>
                    <button class="secondary" onclick="refreshStats()">Refresh</button>
                </div>
                <div id="systemResult"></div>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://127.0.0.1:8080';

        async function call(endpoint, options = {}) {
            try {
                const response = await fetch(`${API}${endpoint}`, {
                    ...options,
                    headers: { 'Content-Type': 'application/json', ...options.headers }
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (e) {
                showError('systemResult', e.message);
                throw e;
            }
        }

        function showError(id, msg) {
            document.getElementById(id).innerHTML = `<div class="error">${msg}</div>`;
        }

        async function checkHealth() {
            try {
                await call('/health');
                document.getElementById('statusDot').classList.remove('offline');
                document.getElementById('statusText').textContent = 'Connected';
            } catch {
                document.getElementById('statusDot').classList.add('offline');
                document.getElementById('statusText').textContent = 'Disconnected';
            }
        }

        async function refreshStats() {
            try {
                const meta = await call('/api/v1/graph/metadata');
                document.getElementById('nodeCount').textContent = meta.node_count || 0;
                document.getElementById('edgeCount').textContent = meta.edge_count || 0;
                
                const retrieval = await call('/api/v1/retrieve', { method: 'POST', body: JSON.stringify({ query: '*', limit: 1000 }) });
                document.getElementById('memCount').textContent = retrieval.results?.length || 0;
                
                document.getElementById('systemResult').innerHTML = '<div class="result-item">System healthy</div>';
            } catch (e) {
                showError('systemResult', e.message);
            }
        }

        async function ingestMemory() {
            const content = document.getElementById('memoryContent').value;
            const source = document.getElementById('memorySource').value || 'user';
            const tags = document.getElementById('memoryTags').value.split(',').map(t => t.trim()).filter(t => t);
            
            if (!content) return showError('ingestResult', 'Content required');
            
            try {
                const result = await call('/api/v1/memory/ingest', {
                    method: 'POST',
                    body: JSON.stringify({ source, format: 'plaintext', content, tags })
                });
                document.getElementById('ingestResult').innerHTML = `<div class="result-item">Memory created: <span class="score">${result.memory_id}</span></div>`;
                document.getElementById('memoryContent').value = '';
                refreshStats();
            } catch (e) {
                showError('ingestResult', e.message);
            }
        }

        async function createNode() {
            const node_type = document.getElementById('nodeType').value;
            const label = document.getElementById('nodeLabel').value;
            
            if (!node_type || !label) return showError('graphResult', 'Type and label required');
            
            try {
                const result = await call('/api/v1/graph/nodes', {
                    method: 'POST',
                    body: JSON.stringify({ node_type, label, properties: {}, provenance: [] })
                });
                document.getElementById('graphResult').innerHTML = `<div class="result-item">Node created: <span class="score">${result.id}</span></div>`;
                refreshStats();
            } catch (e) {
                showError('graphResult', e.message);
            }
        }

        function showGraphTab(tab) {
            document.querySelectorAll('.panel:nth-child(2) .tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('graphTraverseTab').style.display = tab === 'traverse' ? 'block' : 'none';
            document.getElementById('graphEdgeTab').style.display = tab === 'create-edge' ? 'block' : 'none';
            document.getElementById('graphPathTab').style.display = tab === 'path' ? 'block' : 'none';
        }

        async function traverseGraph() {
            const start_node_id = document.getElementById('traverseNodeId').value || null;
            const depth = parseInt(document.getElementById('traverseDepth').value) || 3;
            
            try {
                const result = await call('/api/v1/graph/traverse', {
                    method: 'POST',
                    body: JSON.stringify({ start_node_id, depth })
                });
                document.getElementById('graphResult').innerHTML = result.nodes.map(n => 
                    `<div class="result-item"><span class="score">${n.label}</span> (${n.node_type})<div class="result-meta">${n.id}</div></div>`
                ).join('');
            } catch (e) {
                showError('graphResult', e.message);
            }
        }

        async function createEdge() {
            const source = document.getElementById('edgeSource').value;
            const target = document.getElementById('edgeTarget').value;
            const relation = document.getElementById('edgeRelation').value;
            const confidence = parseFloat(document.getElementById('edgeConfidence').value) || 0.9;
            
            if (!source || !target || !relation) return showError('graphResult', 'All fields required');
            
            try {
                const result = await call('/api/v1/graph/edges', {
                    method: 'POST',
                    body: JSON.stringify({ source, target, relation, properties: {}, provenance: [], confidence })
                });
                document.getElementById('graphResult').innerHTML = `<div class="result-item">Edge created: <span class="score">${result.id}</span></div>`;
                refreshStats();
            } catch (e) {
                showError('graphResult', e.message);
            }
        }

        async function findPath() {
            const start_id = document.getElementById('pathStart').value;
            const end_id = document.getElementById('pathEnd').value;
            
            if (!start_id || !end_id) return showError('graphResult', 'Start and end required');
            
            try {
                const result = await call('/api/v1/graph/path', {
                    method: 'POST',
                    body: JSON.stringify({ start_id, end_id })
                });
                document.getElementById('graphResult').innerHTML = result.path ? 
                    `<div class="result-item">Path: <span class="score">${result.path.join(' → ')}</span></div>` :
                    '<div class="result-item">No path found</div>';
            } catch (e) {
                showError('graphResult', e.message);
            }
        }

        function showRetrieveTab(tab) {
            event.target.classList.add('active');
            document.getElementById('searchTab').style.display = tab === 'search' ? 'block' : 'none';
            document.getElementById('interpretTab').style.display = tab === 'interpret' ? 'block' : 'none';
            document.getElementById('agentsTab').style.display = tab === 'agents' ? 'block' : 'none';
        }

        async function retrieve() {
            const query = document.getElementById('retrieveQuery').value;
            if (!query) return;
            
            try {
                const result = await call('/api/v1/retrieve', {
                    method: 'POST',
                    body: JSON.stringify({ query, limit: 10 })
                });
                
                if (!result.results?.length) {
                    document.getElementById('searchResult').innerHTML = '<div class="result-item">No results found</div>';
                    return;
                }
                
                document.getElementById('searchResult').innerHTML = result.results.map(r => 
                    `<div class="result-item">
                        <div class="score">Score: ${r.score.toFixed(2)}</div>
                        <div>${r.memory?.content || 'N/A'}</div>
                        <div class="result-meta">${r.memory?.memory_id || ''} | ${r.memory?.tags?.map(t => `<span class="tag">${t}</span>`).join('') || ''}</div>
                    </div>`
                ).join('');
            } catch (e) {
                showError('searchResult', e.message);
            }
        }

        async function interpret() {
            const query = document.getElementById('retrieveQuery').value;
            if (!query) return;
            
            try {
                const result = await call('/api/v1/reason/interpret', {
                    method: 'POST',
                    body: JSON.stringify({ query })
                });
                
                document.getElementById('interpretResult').innerHTML = 
                    `<div class="result-item">
                        <div class="score">Belief ID: ${result.belief_state.belief_id}</div>
                        <pre>${JSON.stringify(result.interpretations, null, 2)}</pre>
                        <div class="result-meta">Conflicts: ${result.belief_state.conflict_flags.length}</div>
                    </div>`;
            } catch (e) {
                showError('interpretResult', e.message);
            }
        }

        async function runAgent(type) {
            const query = document.getElementById('retrieveQuery').value;
            const endpoint = `/api/v1/agents/${type}`;
            let body = {};
            
            if (type === 'retriever' || type === 'synthesizer') {
                body = { query, limit: 10 };
            } else {
                const search = await call('/api/v1/retrieve', { method: 'POST', body: JSON.stringify({ query: '*', limit: 10 }) });
                body = { memory_ids: search.results?.map(r => r.memory?.memory_id).filter(Boolean) || [] };
            }
            
            try {
                const result = await call(endpoint, { method: 'POST', body: JSON.stringify(body) });
                document.getElementById('agentResult').innerHTML = 
                    `<div class="result-item">
                        <div class="score">Agent: ${result.agent_id}</div>
                        <pre>${JSON.stringify(result.outputs, null, 2)}</pre>
                    </div>`;
            } catch (e) {
                showError('agentResult', e.message);
            }
        }

        checkHealth();
        refreshStats();
        setInterval(checkHealth, 5000);
    </script>
</body>
</html>
